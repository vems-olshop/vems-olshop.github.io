# Build settings
plugins:
  - jekyll-minify-html
  - jekyll-paginate
  - jekyll-timeago
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-figure
  - jekyll-dotenv

# Frontmatter Defaults
rating_options:
  - 1
  - 2
  - 3
  - 4
  - 5

collections:
  blog:
    output: true
  admin:
    output: true
  pages:
    output: true

permalink: /product/:title

# Site Pagination
paginate: 6
paginate_path: /product/page:num/

defaults:
- scope:
    type: posts
  values:
    layout: etalase

- scope:
    type: checkout
  values:
    layout: checkout_page

- scope:
    type: cart
  values:
    layout: cart_page

- scope:
    type: pages
  values:
    layout: page

- scope:
    type: blog
  values:
    layout: post

# Archives
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: archive
  permalinks:
    category: '/category/:name/'
    tags: '/tag/:name/'

compress_html:
  clippings: all
  ignore:
    envs: development

